<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ITパスポート 合格クエスト</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#f5c842;--win:#1a1a2e;--win2:#16213e;--text:#f0e6c8;--green:#4ade80;--red:#f87171;}
body{min-height:100vh;background:linear-gradient(180deg,#7ec8e3 0%,#b8e4f5 55%,#5a8a3c 55%,#4a7a2c 100%);font-family:'DotGothic16','Noto Sans JP',sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;padding:0 12px 60px;}
.clouds{position:fixed;top:0;left:0;right:0;height:55%;pointer-events:none;overflow:hidden;z-index:0;}
.cloud{position:absolute;background:#fff;border-radius:50px;opacity:.85;}
.cloud::before,.cloud::after{content:"";position:absolute;background:#fff;border-radius:50%;}
.c1{width:80px;height:24px;top:12%;left:10%;animation:drift 20s linear infinite;}
.c1::before{width:40px;height:40px;top:-20px;left:10px;}.c1::after{width:30px;height:30px;top:-14px;left:35px;}
.c2{width:60px;height:20px;top:28%;left:55%;animation:drift 28s linear infinite;}
.c2::before{width:30px;height:30px;top:-15px;left:8px;}.c2::after{width:24px;height:24px;top:-10px;left:28px;}
.c3{width:100px;height:28px;top:8%;left:72%;animation:drift 35s linear infinite;}
.c3::before{width:50px;height:50px;top:-25px;left:15px;}.c3::after{width:36px;height:36px;top:-18px;left:50px;}
@keyframes drift{from{transform:translateX(110vw)}to{transform:translateX(-220px)}}
.trees{position:fixed;bottom:0;left:0;right:0;height:45%;pointer-events:none;z-index:0;overflow:hidden;}
.tree{position:absolute;bottom:0;}.tree-trunk{width:12px;height:28px;background:#6b3a2a;margin:0 auto;}.tree-top{width:40px;height:48px;background:#2d6a2d;border-radius:50% 50% 40% 40%;margin:0 auto;}
.W{position:relative;z-index:10;background:var(--win);border:4px solid var(--gold);border-radius:4px;padding:22px;width:100%;max-width:640px;margin-top:28px;box-shadow:4px 4px 0 #000,inset 0 0 0 2px rgba(245,200,66,.12);}
.exp-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;pointer-events:none;text-align:center;}
.exp-popup.hidden{display:none!important;}
.exp-box{background:var(--win);border:4px solid var(--gold);padding:20px 32px;box-shadow:6px 6px 0 #000;animation:expPop .5s cubic-bezier(.36,.07,.19,.97);}
.exp-title{font-size:13px;color:var(--gold);margin-bottom:8px;letter-spacing:1px;}
.exp-val{font-size:26px;color:var(--gold);font-weight:700;text-shadow:0 0 12px rgba(245,200,66,.6);}
.exp-combo{font-size:14px;color:#ff9f43;margin-top:6px;letter-spacing:1px;}
.exp-lv{font-size:17px;color:#fff;animation:blink .4s step-start infinite;margin-top:8px;}
@keyframes expPop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.sb{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin-bottom:14px;background:var(--win2);border:2px solid var(--gold);flex-wrap:wrap;gap:8px;}
.sname{font-size:13px;color:var(--gold);font-weight:700;}
.scnt{font-size:10px;color:#666;margin-top:2px;}
.gauges{display:flex;gap:12px;align-items:center;}
.gw{display:flex;align-items:center;gap:6px;font-size:11px;}
.gl{color:var(--gold);min-width:26px;}
.gb{width:76px;height:10px;background:#333;border:1px solid #555;border-radius:1px;overflow:hidden;}
.gf{height:100%;border-radius:1px;transition:width .5s;}
.ghp{background:linear-gradient(90deg,#e74c3c,#ff6b6b);}
.gex{background:linear-gradient(90deg,#f39c12,var(--gold));}
.gv{font-size:10px;color:#aaa;min-width:36px;}
.badge{display:inline-block;padding:3px 10px;margin-bottom:8px;background:rgba(245,200,66,.1);border:2px solid var(--gold);font-size:11px;color:var(--gold);letter-spacing:.5px;}
.qtext{font-size:clamp(13px,2.2vw,15px);line-height:1.9;color:var(--text);margin-bottom:16px;border-left:3px solid var(--gold);padding-left:10px;}
.cmdwin{background:var(--win2);border:3px solid var(--gold);padding:4px 0;margin-bottom:12px;}
.cmd{display:flex;align-items:flex-start;gap:0;padding:9px 14px;cursor:pointer;transition:background .1s;font-size:13px;color:var(--text);border:none;background:transparent;width:100%;text-align:left;font-family:inherit;line-height:1.6;}
.cmd:hover:not([disabled]){background:rgba(245,200,66,.1);}
.cmd.ok{background:rgba(74,222,128,.1);color:var(--green);}
.cmd.ng{background:rgba(248,113,113,.1);color:var(--red);}
.cmd.fd{color:#444;cursor:default;}
.cur{color:var(--gold);min-width:20px;font-size:14px;flex-shrink:0;margin-top:1px;}
.kn{min-width:28px;font-size:11px;color:var(--gold);border:1px solid rgba(245,200,66,.4);padding:1px 4px;margin-right:8px;flex-shrink:0;text-align:center;background:rgba(245,200,66,.07);}
.cmd.ok .kn{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.1);}
.cmd.ng .kn{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.1);}
.cmd.fd .kn{border-color:#333;color:#333;background:transparent;}
.msgwin{background:var(--win2);border:3px solid var(--gold);padding:14px 16px;margin-top:12px;animation:fi .25s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.mhead{font-size:11px;color:var(--gold);margin-bottom:6px;letter-spacing:.5px;}
.mbody{font-size:12px;line-height:1.9;color:#d4c9a8;white-space:pre-wrap;}
.nbtn{width:100%;padding:12px;margin-top:12px;background:var(--win2);border:3px solid var(--gold);color:var(--gold);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.5px;transition:background .15s;animation:fi .3s ease;}
.nbtn:hover{background:rgba(245,200,66,.1);}
.nbtn::before{content:"▶ ";}
.sbtn{width:100%;padding:15px;background:rgba(245,200,66,.08);border:3px solid var(--gold);color:var(--gold);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:1px;transition:background .15s;box-shadow:3px 3px 0 #000;}
.sbtn:hover{background:rgba(245,200,66,.18);}
.sbtn::before{content:"► ";}
.gbtn{width:100%;padding:11px;background:transparent;border:2px solid rgba(245,200,66,.3);color:#a0b4c0;font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;letter-spacing:.5px;margin-top:6px;}
.gbtn:hover{border-color:var(--gold);color:var(--gold);}
.gbtn::before{content:"▷ ";}
.htitle{text-align:center;margin-bottom:18px;}
.htitle h1{font-size:clamp(18px,4vw,26px);color:var(--gold);font-weight:700;text-shadow:0 0 20px rgba(245,200,66,.4);letter-spacing:1px;}
.htitle p{font-size:12px;color:#777;margin-top:4px;}
.hstats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:2px;}
.hstat{background:var(--win2);border:2px solid rgba(245,200,66,.3);padding:8px 16px;text-align:center;}
.hstat .v{font-size:17px;color:var(--gold);font-weight:700;}
.hstat .l{font-size:10px;color:#666;}
.rfanfare{font-size:11px;color:var(--gold);letter-spacing:2px;text-align:center;margin-bottom:4px;}
.rtitle{font-size:20px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:4px;}
.rscore{font-size:42px;font-weight:700;text-align:center;line-height:1;}
.rrank{font-size:15px;font-weight:700;text-align:center;margin-top:4px;margin-bottom:14px;}
.rlist{max-height:260px;overflow-y:auto;margin-bottom:14px;}
.rrow{display:flex;gap:8px;align-items:flex-start;padding:7px 10px;margin-bottom:3px;border-left:3px solid transparent;font-size:11px;background:rgba(255,255,255,.03);}
.rrow.ok{border-color:var(--green);color:#a0e4b0;}
.rrow.ng{border-color:var(--red);color:#f0a0a0;}
.rans{color:var(--red);margin-top:2px;font-size:10px;}
.rnb{color:var(--gold);font-weight:700;margin-right:4px;}
.divider{height:2px;background:rgba(245,200,66,.18);margin:12px 0;}
/* パーフェクト演出 */
.perfect-banner{
  display:none;text-align:center;
  padding:16px 10px;margin-bottom:12px;
  background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(255,160,0,.1));
  border:3px solid var(--gold);
  animation:pfIn .6s cubic-bezier(.36,.07,.19,.97);
}
.perfect-banner.show{display:block;}
.pf-crown{font-size:44px;animation:crownSpin 1s ease;}
.pf-title{font-size:20px;color:var(--gold);font-weight:700;letter-spacing:2px;margin:6px 0;text-shadow:0 0 20px rgba(245,200,66,.8),0 0 40px rgba(245,200,66,.4);}
.pf-sub{font-size:12px;color:#d4aa60;letter-spacing:1px;}
@keyframes pfIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes crownSpin{0%{transform:rotate(-15deg) scale(.5);opacity:0}50%{transform:rotate(8deg) scale(1.2)}100%{transform:rotate(0) scale(1);opacity:1}}
/* 紙吹雪 */
.confetti-wrap{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:998;overflow:hidden;display:none;}
.confetti-wrap.show{display:block;}
.cf{position:absolute;width:8px;height:8px;opacity:0;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.hidden{display:none!important;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease;}
</style>
</head>
<body>
<div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div></div>
<div class="trees">
  <div class="tree" style="left:5%"><div class="tree-top"></div><div class="tree-trunk"></div></div>
  <div class="tree" style="left:18%"><div class="tree-top" style="width:52px;height:60px"></div><div class="tree-trunk" style="height:32px"></div></div>
  <div class="tree" style="left:75%"><div class="tree-top"></div><div class="tree-trunk"></div></div>
  <div class="tree" style="left:88%"><div class="tree-top" style="width:48px;height:56px"></div><div class="tree-trunk" style="height:30px"></div></div>
</div>

<div class="exp-popup hidden" id="ep">
  <div class="exp-box">
    <div class="exp-title" id="et">けいけんちを かくとく！</div>
    <div class="exp-val" id="ev"></div>
    <div class="exp-combo hidden" id="ec"></div>
    <div class="exp-lv hidden" id="el">⭐ レベルアップ！ ⭐</div>
  </div>
</div>

<!-- HOME -->
<div class="W" id="sh">
  <div class="htitle">
    <h1 id="ht">ITパスポート 合格クエスト</h1>
    <p id="hs">2026年3月23日配信</p>
  </div>
  <div class="hstats">

    <div class="hstat"><div class="v" id="hl">Lv.1</div><div class="l">げんざいレベル</div></div>
    <div class="hstat"><div class="v" id="hd">2026/3/23</div><div class="l">はいしんび</div></div>

</div>

<!-- QUIZ -->
<div class="W hidden" id="sq">

    <div class="gauges">
      <div class="gw"><span class="gl">HP</span><div class="gb"><div class="gf ghp" id="ghp" style="width:100%"></div></div><span class="gv" id="ghpv">10/10</span></div>
      <div class="gw"><span class="gl">EXP</span><div class="gb"><div class="gf gex" id="gex" style="width:0%"></div></div><span class="gv" id="gexv">0</span></div>
    </div>

</div>

<!-- 紙吹雪 -->

</div>

<script>
const KANA=["ア","イ","ウ","エ"];
const AQ=[{"id":1,"number":"令和2年 問9","question":"国連が中心となり，持続可能な世界を実現するために設定した17のゴールから成る国際的な開発目標はどれか。","choices":["COP21","SDGs","UNESCO","WHO"],"answer":1,"explanation":"正解は「イ」です。SDGs（Sustainable Development Goals：持続可能な開発目標）は、国連が採択した2030年までに持続可能でよりよい世界を目指す国際目標です。\n\n【他の選択肢】\nアの「COP21」は、気候変動枠組条約の第21回締約国会議のことで、パリ協定が採択されました。\nウの「UNESCO」は、教育・科学・文化の発展を通じて国際平和に貢献する国連教育科学文化機関です。\nエの「WHO」は、人間の健康を基本的人権の一つと捉え、その達成を目的とする世界保健機関です。"},{"id":2,"number":"令和6年 問5","question":"ベンチャーキャピタルに関する記述として，最も適切なものはどれか。","choices":["新しい技術の獲得や，規模の経済性の追求などを目的に，他の企業と共同出資会社を設立する手法","株式売却による利益獲得などを目的に，新しい製品やサービスを武器に市場に参入しようとする企業に対して出資などを行う企業","新サービスや技術革新などの創出を目的に，国や学術機関，他の企業など外部の組織と共創関係を結び，積極的に技術や資源を交換し，自社に取り込む手法","特定された課題の解決を目的に，一定の期間を定めて企業内に立ち上げられ，構成員を関連部門から招集し，目的が達成された時点で解散する組織"],"answer":1,"explanation":"正解は「イ」です。ベンチャーキャピタルは、高い成長が見込まれる未上場企業（ベンチャー企業）に出資し、将来の上場時などの株式売却益（キャピタルゲイン）を狙う投資会社です。\n\n【他の選択肢】\nアは「ジョイントベンチャー（合弁会社）」の説明です。\nウは「オープンイノベーション」の説明です。\nエは「プロジェクト組織」の説明です。"},{"id":3,"number":"令和7年 問2","question":"従来の情報セキュリティマネジメントシステム規格を基礎に追加で制定されたもので，クラウドサービスに対応した情報セキュリティ管理体制を構築するためのガイドライン規格として，最も適切なものはどれか。","choices":["ISO 14001","JIS Q 15001","ISO/IEC 27017","ISO 9001"],"answer":2,"explanation":"正解は「ウ」です。ISO/IEC 27017は、クラウドサービスにおける情報セキュリティ管理策のガイドラインを定めた国際規格です。\n\n【他の選択肢】\nアの「ISO 14001」は、環境マネジメントシステムに関する国際規格です。\nイの「JIS Q 15001」は、個人情報保護マネジメントシステムに関する要求事項を定めた日本産業規格（プライバシーマークの基準）です。\nエの「ISO 9001」は、品質マネジメントシステムに関する国際規格です。"},{"id":4,"number":"令和3年 問44","question":"ITサービスマネジメントにおいて，サービスデスクが受け付けた難度の高いインシデントを解決するために，サービスデスクの担当者が専門技術をもつ二次サポートに解決を委ねることはどれか。","choices":["FAQ","SLA","エスカレーション","ワークアラウンド"],"answer":2,"explanation":"正解は「ウ」です。エスカレーションは、担当者レベルでは解決が困難な問題が発生した際、より高度な知識を持つ上位の担当者や管理者に対応を引き継ぐことです。\n\n【他の選択肢】\nアの「FAQ」は、よくある質問とその回答をまとめたものです。\nイの「SLA」は、サービス提供者と利用者の間で結ばれる、サービスレベル（品質）に関する合意書です。\nエの「ワークアラウンド」は、根本的な解決策が不明な場合に、暫定的に問題を回避するための応急処置のことです。"},{"id":5,"number":"令和4年 問49","question":"リファクタリングの説明として，適切なものはどれか。","choices":["ソフトウェアが提供する機能仕様を変えずに，内部構造を改善すること","ソフトウェアの動作などを解析して，その仕様を明らかにすること","ソフトウェアの不具合を修正し，仕様どおりに動くようにすること","利用者の要望などを基に，ソフトウェアに新しい機能を加える修正をすること"],"answer":0,"explanation":"正解は「ア」です。リファクタリングは、プログラムの外部から見た動作（機能仕様）を変えずに、ソースコードの内部構造を整理して読みやすく・保守しやすくする手法です。\n\n【他の選択肢】\nイは「リバースエンジニアリング」の説明です。\nウは「デバッグ（不具合修正）」の説明です。\nエは「機能追加（バージョンアップなど）」の説明です。"},{"id":6,"number":"令和2年 問58","question":"受信した電子メールに添付されていた文書ファイルを開いたところ，PCの挙動がおかしくなった。疑われる攻撃として，適切なものはどれか。","choices":["SQLインジェクション","クロスサイトスクリプティング","ショルダーハッキング","マクロウイルス"],"answer":3,"explanation":"正解は「エ」です。マクロウイルスは、ワープロソフトや表計算ソフトの「マクロ機能」を悪用して感染するコンピュータウイルスであり、添付ファイルを開くことで被害をもたらします。\n\n【他の選択肢】\nアの「SQLインジェクション」は、データベースと連動するWebサイトの入力フォームに不正なSQL文を注入し、データを改ざん・漏えいさせる攻撃です。\nイの「クロスサイトスクリプティング」は、Webサイトの脆弱性を突き、利用者のブラウザ上で悪意のあるスクリプトを実行させる攻撃です。\nウの「ショルダーハッキング」は、他人がパスワードなどを入力する際に肩越しに盗み見るなどして情報を盗む物理的な手口です。"},{"id":7,"number":"令和3年 問74","question":"サーバ室など，セキュリティで保護された区画への入退室管理において，一人の認証で他者も一緒に入室する共連れの防止対策として，利用されるものはどれか。","choices":["アンチパスバック","コールバック","シングルサインオン","バックドア"],"answer":0,"explanation":"正解は「ア」です。アンチパスバックは、入室時に認証記録がないと退室できない（またはその逆）ようにする仕組みで、認証せずに後について入室する「共連れ」を防止します。\n\n【他の選択肢】\nイの「コールバック」は、遠隔からアクセスしてきた相手の身元を確認するため、システム側から一度通信を切り、あらかじめ登録された番号へかけ直す仕組みです。\nウの「シングルサインオン」は、一度の認証で複数のシステムやサービスを利用できるようにする仕組みです。\nエの「バックドア」は、正規の経路を通らずにシステムに侵入できるように作られた「裏口」のことです。"},{"id":8,"number":"令和5年 問98","question":"ランサムウェアに関する記述として，最も適切なものはどれか。","choices":["PCに外部から不正にログインするための侵入路をひそかに設置する。","PCのファイルを勝手に暗号化し，復号のためのキーを提供することなどを条件に金銭を要求する。","Webブラウザを乗っ取り，オンラインバンキングなどの通信に割り込んで不正送金などを行う。","自らネットワークを経由して感染を広げる機能をもち，まん延していく。"],"answer":1,"explanation":"正解は「イ」です。ランサムウェアは、感染したPCのデータを暗号化して使えなくした上で、元に戻すこと（復号）と引き換えに身代金（ランサム）を要求するマルウェアです。\n\n【他の選択肢】\nアは「バックドア」の説明です。\nウは「MITB（マン・イン・ザ・ブラウザ）攻撃」などのバンキングトロジャンの説明です。\nエは自己増殖機能を持つ「ワーム」の説明です。"},{"id":9,"number":"令和6年 問87","question":"通常の検索エンジンでは検索されず匿名性が高いので，サイバー攻撃や違法商品の取引などにも利用されることがあり，アクセスするには特殊なソフトウェアが必要になることもあるインターネット上のコンテンツの総称を何と呼ぶか。","choices":["RSS","SEO","クロスサイトスクリプティング","ダークウェブ"],"answer":3,"explanation":"正解は「エ」です。ダークウェブは、特殊なブラウザやネットワーク設定を用いないとアクセスできず、高度な匿名性を持つため犯罪の温床になりやすいインターネットの領域です。\n\n【他の選択肢】\nアの「RSS」は、Webサイトのニュースやブログの更新情報などを配信するための文書フォーマットです。\nイの「SEO」は、検索エンジンの検索結果で自身のWebサイトを上位に表示させるための最適化手法です。\nウの「クロスサイトスクリプティング」は、Webサイトの脆弱性を突いて悪意のあるスクリプトを実行させるサイバー攻撃です。"},{"id":10,"number":"令和7年 問81","question":"イメージスキャナーで読み取った紙の書類の画像から，印刷文字や手書きの文字を読み取り，テキストデータに変換する技術を何と呼ぶか。","choices":["CCD","DVI","GPU","OCR"],"answer":3,"explanation":"正解は「エ」です。OCR（Optical Character Recognition：光学的文字認識）は、画像データとして取り込まれた文字の形を解析し、編集可能なテキストデータに変換する技術です。\n\n【他の選択肢】\nアの「CCD」は、デジタルカメラやスキャナなどで光を電気信号に変換する画像センサー（撮像素子）の一種です。\nイの「DVI」は、PCとディスプレイを接続し、映像信号を伝送するためのインターフェース規格です。\nウの「GPU」は、3Dグラフィックスなどの画像処理を専門に行う演算装置です。"}];
const TITLE="ITパスポート 合格クエスト";
const SUB="2026年3月23日配信";
const ISSUED="2026/3/23";
const EPQ=100,MAX_LV=5;
// Lv.1→2:200, 2→3:400, 3→4:600, 4→5:800 の累積閾値
const LV_THRESH=[0,200,600,1200,2000];
function calcLv(exp){
  let l=1;
  for(let i=1;i<LV_THRESH.length;i++){if(exp>=LV_THRESH[i])l=i+1;}
  return Math.min(l,MAX_LV);
}
function expToNext(exp){
  const l=calcLv(exp);
  if(l>=MAX_LV)return null;
  return LV_THRESH[l]-exp;
}
function expPct(exp){
  const l=calcLv(exp);
  if(l>=MAX_LV)return 100;
  const base=LV_THRESH[l-1],next=LV_THRESH[l];
  return Math.round((exp-base)/(next-base)*100);
}
let qQs=[],cur=0,ans=[],sel=null,tExp=0,lv=1,combo=0;
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function show(id){["sh","sq","sr"].forEach(s=>document.getElementById(s).classList.toggle("hidden",s!==id));}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function goHome(){show("sh");}
function upLv(){
  const el=document.getElementById("hl");
  el.textContent=lv>=MAX_LV?"Lv."+MAX_LV+" ★MAX★":"Lv."+lv;
}
window.onload=()=>{ upLv(); };
function startQuiz(pool){
  qQs=shuffle(pool||AQ).slice(0,Math.min(10,(pool||AQ).length));
  cur=0;ans=[];sel=null;combo=0;renderQ();show("sq");
}
function renderQ(){
  sel=null;const q=qQs[cur];
  const remain=qQs.length-ans.filter(a=>!a.correct).length;
  document.getElementById("qcl").textContent="もんだい "+(cur+1)+"/"+qQs.length;
  document.getElementById("ghp").style.width=Math.max(0,Math.round(remain/qQs.length*100))+"%";
  document.getElementById("ghpv").textContent=remain+"/"+qQs.length;
  document.getElementById("gex").style.width=expPct(tExp)+"%";
  document.getElementById("gexv").textContent=lv>=MAX_LV?"MAX":tExp+"exp";
  const b=document.getElementById("qbadge");
  if(q.number){b.textContent="📅 "+q.number;b.classList.remove("hidden");}else b.classList.add("hidden");
  document.getElementById("qtext").textContent=q.question;
  const w=document.getElementById("qchoices");w.innerHTML="";
  q.choices.forEach((ch,i)=>{
    if(!ch)return;
    const btn=document.createElement("button");btn.className="cmd";
    btn.innerHTML=`<span class="cur">▶</span><span class="kn">${KANA[i]}</span><span>${esc(ch)}</span>`;
    btn.addEventListener("click",()=>doSelect(i));w.appendChild(btn);
  });
  document.getElementById("qexp").classList.add("hidden");
  document.getElementById("qnw").classList.add("hidden");
}
function doSelect(idx){
  if(sel!==null)return;sel=idx;
  const q=qQs[cur];const ok=idx===q.answer;
  ans.push({q,chosen:idx,correct:ok});
  const btns=document.querySelectorAll("#qchoices .cmd");
  btns.forEach((btn,i)=>{
    btn.disabled=true;const c=btn.querySelector(".cur");
    if(i===q.answer){btn.classList.add("ok");c.textContent="✓";}
    else if(i===idx){btn.classList.add("ng");c.textContent="✗";}
    else{btn.classList.add("fd");c.textContent="　";}
  });
  if(ok){
    combo++;
    const gain=EPQ+Math.max(0,(combo-1)*50);
    const old=lv;
    tExp=Math.min(tExp+gain, LV_THRESH[MAX_LV-1]); // MAX EXPで上限
    lv=calcLv(tExp);
    showEP(gain,lv>old,combo);
    document.getElementById("gex").style.width=expPct(tExp)+"%";
    document.getElementById("gexv").textContent=lv>=MAX_LV?"MAX":tExp+"exp";
    upLv();
  }else{
    combo=0;
    const c=document.getElementById("sq");c.classList.add("shake");setTimeout(()=>c.classList.remove("shake"),400);
    const r=qQs.length-ans.filter(a=>!a.correct).length;
    document.getElementById("ghp").style.width=Math.max(0,Math.round(r/qQs.length*100))+"%";
    document.getElementById("ghpv").textContent=r+"/"+qQs.length;
  }
  if(q.explanation){document.getElementById("qexpb").textContent=q.explanation;document.getElementById("qexp").classList.remove("hidden");}
  const nw=document.getElementById("qnw");nw.classList.remove("hidden");
  document.getElementById("qnb").textContent=(cur+1>=qQs.length)?"けっかを みる":"つぎのもんだいへ";
}
function showEP(g,lu,cb){
  const p=document.getElementById("ep");
  const et=document.getElementById("et");
  const ec=document.getElementById("ec");
  const le=document.getElementById("el");
  if(cb>=3){
    et.textContent="コンボボーナス！🔥";
    ec.textContent=cb+"れんぞく せいかい！";
    ec.classList.remove("hidden");
  }else if(cb===2){
    et.textContent="コンボ！⚡";
    ec.textContent="2れんぞく せいかい！";
    ec.classList.remove("hidden");
  }else{
    et.textContent="けいけんちを かくとく！";
    ec.classList.add("hidden");
  }
  document.getElementById("ev").textContent="＋"+g+" EXP";
  lu?le.classList.remove("hidden"):le.classList.add("hidden");
  if(lu) le.textContent=lv>=MAX_LV?"★ MAX レベル とうたつ！ ★":"⭐ レベルアップ！ ⭐";
  p.classList.remove("hidden");setTimeout(()=>p.classList.add("hidden"),lu?2200:cb>=2?1600:1200);
}
function nextQ(){if(cur+1>=qQs.length){showResult();return;}cur++;renderQ();}
function showResult(){
  show("sr");
  const sc=ans.filter(a=>a.correct).length;
  const perfect=sc===qQs.length;
  const pt=Math.round(sc/qQs.length*100);
  const rk=pt>=90?{l:"つよすぎる！ 🏆",c:"#FFD700"}:pt>=70?{l:"よくできました！ ✨",c:"#4ade80"}:pt>=50?{l:"もうすこし！ 💪",c:"#fb923c"}:{l:"ふくしゅうが ひつよう 📚",c:"#f87171"};
  document.getElementById("rsc").textContent=pt+"%";document.getElementById("rsc").style.color=rk.c;
  document.getElementById("rrk").textContent=rk.l+" ／ 最終Lv."+lv+(lv>=MAX_LV?" ★MAX":"");
  document.getElementById("rrk").style.color=rk.c;

  // パーフェクト演出
  const pfBanner=document.getElementById("pf-banner");
  const fanfare=document.getElementById("r-fanfare");
  if(perfect){
    pfBanner.classList.add("show");
    fanfare.textContent="✨ ✨ ✨ かんぺき クリア ✨ ✨ ✨";
    fanfare.style.color="#fff";
    launchConfetti();
  } else {
    pfBanner.classList.remove("show");
    fanfare.textContent="★ ★ ★ ぼうけん かんりょう ★ ★ ★";
    fanfare.style.color="";
    document.getElementById("confetti").classList.remove("show");
  }

  const wr=ans.filter(a=>!a.correct);
  const rb=document.getElementById("rretry");
  if(wr.length>0){rb.textContent="▷ まちがえた "+wr.length+" もんを ふくしゅう";rb.classList.remove("hidden");}else rb.classList.add("hidden");
  document.getElementById("rl").innerHTML=ans.map((a,i)=>`<div class="rrow ${a.correct?"ok":"ng"}"><span style="min-width:16px">${a.correct?"✅":"❌"}</span><div>${a.q.number?'<span class="rnb">'+esc(a.q.number)+'</span>':''}${esc(a.q.question.slice(0,40))}…${!a.correct?'<div class="rans">せいかい：'+KANA[a.q.answer]+'. '+esc(a.q.choices[a.q.answer])+'</div>':''}</div></div>`).join("");
  document.getElementById("hprev").classList.remove("hidden");
}
function launchConfetti(){
  const wrap=document.getElementById("confetti");
  wrap.innerHTML=""; wrap.classList.add("show");
  const colors=["#f5c842","#4ade80","#f87171","#a78bfa","#67e8f9","#fff","#ff9f43"];
  for(let i=0;i<60;i++){
    const el=document.createElement("div");
    el.className="cf";
    const size=Math.random()*8+4;
    el.style.cssText=`
      left:${Math.random()*100}%;
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?"50%":"2px"};
      animation-duration:${Math.random()*2+1.5}s;
      animation-delay:${Math.random()*1}s;
    `;
    wrap.appendChild(el);
  }
  setTimeout(()=>wrap.classList.remove("show"),4000);
}
function retryWrong(){startQuiz(ans.filter(a=>!a.correct).map(a=>a.q));}
</script>
</body>
